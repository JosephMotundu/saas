{% extends "base_app.html" %}

{% block title %}Supprimer {{ object.titre }} — ParoisseConnect{% endblock %}

{% block content %}
<h1>Supprimer cette annonce ?</h1>
<div class="fiche">
  <p>Voulez-vous vraiment supprimer l'annonce <strong>{{ object.titre }}</strong> ? Cette
    action est irréversible.</p>
  <form method="post">
    {% csrf_token %}
    <div class="actions-fiche">
      <a class="bouton-secondaire" href="{% url 'communication:annonce_detail' object.pk %}">Annuler</a>
      <button type="submit" class="bouton-danger">Confirmer la suppression</button>
    </div>
  </form>
</div>
{% endblock %}
