{% extends "base_app.html" %}

{% block title %}Supprimer {{ object.nom_complet }} — ParoisseConnect{% endblock %}

{% block content %}
<h1>Supprimer ce paroissien ?</h1>
<div class="fiche">
  <p>Voulez-vous vraiment supprimer <strong>{{ object.nom_complet }}</strong> ? Cette action est
    irréversible.</p>
  <form method="post">
    {% csrf_token %}
    <div class="actions-fiche">
      <a class="bouton-secondaire" href="{% url 'paroissiens:paroissien_detail' object.pk %}">Annuler</a>
      <button type="submit" class="bouton-danger">Confirmer la suppression</button>
    </div>
  </form>
</div>
{% endblock %}
