services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-paroisseconnect}
      POSTGRES_USER: ${POSTGRES_USER:-paroisseconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paroisseconnect}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paroisseconnect}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgres://${POSTGRES_USER:-paroisseconnect}:${POSTGRES_PASSWORD:-paroisseconnect}@db:5432/${POSTGRES_DB:-paroisseconnect}
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
